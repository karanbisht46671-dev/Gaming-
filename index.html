<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karan Gaming Zone - Free Fire, GTA & BGMI Tips</title>
    <style>
        /* प्रो-गेमिंग डार्क थीम */
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            scroll-behavior: smooth;
        }
        header {
            background-color: #16161d;
            padding: 30px;
            border-radius: 10px;
            border-bottom: 4px solid #ff4a5a;
            box-shadow: 0px 4px 15px rgba(255, 74, 90, 0.3);
            margin-bottom: 20px;
        }
        h1 {
            color: #ff4a5a;
            margin: 0 0 10px 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        header p {
            color: #00ffd1;
            font-size: 18px;
            margin: 0;
        }
        
        /* 🕹️ मेनू बार स्टाइल */
        nav {
            background-color: #16161d;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            margin: 0 10px;
            padding: 8px 16px;
            border-radius: 5px;
            transition: 0.3s;
        }
        nav a.ff-btn:hover { background-color: #ff4a5a; color: #fff; }
        nav a.gta-btn:hover { background-color: #e0a96d; color: #000; }
        nav a.bgmi-btn:hover { background-color: #39ff14; color: #000; }
        nav a.mc-btn:hover { background-color: #ffaa00; color: #000; }
        nav a.about-btn:hover { background-color: #00ffd1; color: #000; }
        nav a.contact-btn:hover { background-color: #ff00ff; color: #fff; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: left;
        }
        article, .about-section, .contact-section {
            background-color: #222242;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.5);
        }
        
        .ff-post { border-left: 5px solid #ff4a5a; }
        .ff-post h2 { color: #ff4a5a; }

        .gta-post { border-left: 5px solid #e0a96d; }
        .gta-post h2 { color: #e0a96d; }

        .bgmi-post { border-left: 5px solid #39ff14; }
        .bgmi-post h2 { color: #39ff14; }

        /* 🆕 Minecraft पोस्ट स्टाइल (नियॉन गोल्ड) */
        .mc-post { border-left: 5px solid #ffaa00; }
        .mc-post h2 { color: #ffaa00; }

        /* 📸 इमेज की कोडिंग (ताकि फोटो स्क्रीन पर फिट बैठे) */
        .post-image {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #555;
        }

        .about-section { border-left: 5px solid #00ffd1; }
        .about-section h2 { color: #00ffd1; }

        .contact-section { border-left: 5px solid #ff00ff; }
        .contact-section h2 { color: #ff00ff; }

        h2 {
            margin-top: 0;
            font-size: 26px;
        }
        h3 {
            color: #00ffd1;
            margin-top: 25px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #e0e0e0;
        }
        ul {
            background: #16161d;
            padding: 20px 40px;
            border-radius: 8px;
            list-style-type: square;
        }
